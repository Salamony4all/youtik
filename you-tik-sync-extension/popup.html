<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>You-Tik Sync</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background: #0f0f11;
      color: #fff;
      text-align: center;
    }
    h3 {
      margin-top: 0;
      font-weight: 900;
      font-style: italic;
      font-size: 20px;
      letter-spacing: -0.5px;
    }
    .text-yt {
      color: #ff0000;
    }
    p {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #8b5cf6, #ec4899);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .status {
      margin-top: 16px;
      font-size: 11px;
      font-weight: bold;
      color: #10b981;
      display: none;
    }
    .status.error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <h3>You<span class="text-yt">Tik</span> Sync</h3>
  <p>Your session cookies are ready to be synced with the cloud backend.</p>
  
  <button class="btn" id="btn-sync-youtube">Sync YouTube Session</button>
  <button class="btn" id="btn-sync-tiktok">Sync TikTok Session</button>
  
  <div id="status" class="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
